AWSTemplateFormatVersion: '2010-09-09'
Description: >
  rust-aws-git-lfs - Git LFS server (Lambda + S3 + API Gateway + CloudFront).
  An RSA key pair is automatically generated at stack creation time.

Metadata:
  cfn-lint:
    config:
      ignore_checks:
        - W1030  # LambdaMaxConcurrency uses -1 as "unlimited" sentinel; !If with AWS::NoValue handles it correctly

# ────────────────────────────────────────────────────────────────────────────
# Parameters (values that must be provided at stack creation)
# ────────────────────────────────────────────────────────────────────────────
Parameters:

  ArtifactsBucketName:
    Type: String
    Description: >
      S3 bucket name where the pre-built Lambda ZIPs are stored.
      The bucket MUST be in the same AWS region as this stack - a cross-region bucket causes
      a PermanentRedirect error and the Lambda functions will fail to create.
      Upload rust-aws-lfs.zip and rust-aws-lfs-authorizer.zip before creating the stack.

  MainFunctionS3Key:
    Type: String
    Default: rust-aws-lfs.zip
    Description: S3 object key for the main Lambda ZIP

  AuthorizerFunctionS3Key:
    Type: String
    Default: rust-aws-lfs-authorizer.zip
    Description: S3 object key for the authorizer Lambda ZIP

  CloudFrontSignedUrlTTL:
    Type: Number
    Default: 3600
    Description: TTL in seconds for CloudFront Signed URLs


  LogRetentionDays:
    Type: Number
    Default: 30
    Description: CloudWatch Logs retention period in days for all Lambda functions

  CloudFrontGeoRestrictionLocations:
    Type: String
    Default: ""
    Description: >
      Comma-separated ISO 3166-1 alpha-2 country codes for CloudFront whitelist geo restriction.
      Leave empty for no restriction (e.g. JP,US).

  ApiThrottlingRateLimit:
    Type: Number
    Default: 10
    Description: API Gateway sustained requests per second per stage

  ApiThrottlingBurstLimit:
    Type: Number
    Default: 50
    Description: API Gateway maximum burst requests per stage

  LambdaMaxConcurrency:
    Type: Number
    Default: -1
    Description: >
      Reserved concurrent executions per Lambda function. Leave at -1 (default) in most cases -
      API Gateway throttling already limits the request rate. Only set a positive value if you need
      a hard Lambda-side cap. Note: AWS requires the total unreserved concurrency across all Lambda
      functions in the account to stay at or above 10.

# ────────────────────────────────────────────────────────────────────────────
# Resources
# ────────────────────────────────────────────────────────────────────────────
# ────────────────────────────────────────────────────────────────────────────
# Conditions
# ────────────────────────────────────────────────────────────────────────────
Conditions:
  HasLambdaConcurrencyLimit: !Not [!Equals [!Ref LambdaMaxConcurrency, "-1"]]
  HasGeoRestriction: !Not [!Equals [!Ref CloudFrontGeoRestrictionLocations, ""]]

# ────────────────────────────────────────────────────────────────────────────
# Resources
# ────────────────────────────────────────────────────────────────────────────
Resources:

  # ── RSA key pair auto-generation (custom resource) ───────────────────────

  RSAKeyGenRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal: { Service: lambda.amazonaws.com }
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: SSMAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: [ssm:PutParameter, ssm:GetParameter, ssm:DeleteParameter]
                Resource: !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/rust-aws-lfs/*"

  RSAKeyGenFunction:
    Type: AWS::Lambda::Function
    DependsOn: RSAKeyGenFunctionLogGroup
    Properties:
      FunctionName: !Sub "${AWS::StackName}-rsa-key-gen"
      Runtime: python3.12
      Handler: index.handler
      Role: !GetAtt RSAKeyGenRole.Arn
      Timeout: 60
      Environment:
        Variables:
          STACK_NAME: !Ref AWS::StackName
      Code:
        ZipFile: |
          import json, os, subprocess, tempfile, urllib.request, boto3

          _stack = os.environ['STACK_NAME']
          PRIV = f'/rust-aws-lfs/{_stack}/cf-private-key'
          PUB  = f'/rust-aws-lfs/{_stack}/cf-public-key'

          def respond(event, context, status, data=None, reason=None):
              body = json.dumps({
                  'Status': status,
                  'Reason': reason or context.log_stream_name,
                  'PhysicalResourceId': event.get('PhysicalResourceId', context.log_stream_name),
                  'StackId': event['StackId'],
                  'RequestId': event['RequestId'],
                  'LogicalResourceId': event['LogicalResourceId'],
                  'Data': data or {}
              }).encode()
              req = urllib.request.Request(
                  event['ResponseURL'], data=body,
                  headers={'Content-Type': ''}, method='PUT')
              urllib.request.urlopen(req)

          def handler(event, context):
              ssm = boto3.client('ssm')
              try:
                  if event['RequestType'] == 'Delete':
                      for p in [PRIV, PUB]:
                          try: ssm.delete_parameter(Name=p)
                          except: pass
                      respond(event, context, 'SUCCESS')
                      return

                  if event['RequestType'] == 'Update':
                      priv = ssm.get_parameter(Name=PRIV, WithDecryption=True)['Parameter']['Value']
                      pub  = ssm.get_parameter(Name=PUB)['Parameter']['Value']
                      respond(event, context, 'SUCCESS', {'PrivateKeyPem': priv, 'PublicKeyPem': pub})
                      return

                  # Create: generate PKCS#8 RSA key pair with openssl
                  with tempfile.TemporaryDirectory() as d:
                      priv_path = os.path.join(d, 'private.pem')
                      pub_path  = os.path.join(d, 'public.pem')
                      subprocess.run(
                          ['openssl', 'genpkey', '-algorithm', 'RSA',
                           '-pkeyopt', 'rsa_keygen_bits:2048', '-out', priv_path],
                          check=True, capture_output=True)
                      subprocess.run(
                          ['openssl', 'rsa', '-pubout', '-in', priv_path, '-out', pub_path],
                          check=True, capture_output=True)
                      priv = open(priv_path).read()
                      pub  = open(pub_path).read()

                  ssm.put_parameter(Name=PRIV, Value=priv, Type='SecureString', Overwrite=True)
                  ssm.put_parameter(Name=PUB,  Value=pub,  Type='String',       Overwrite=True)
                  respond(event, context, 'SUCCESS', {'PrivateKeyPem': priv, 'PublicKeyPem': pub})
              except Exception as e:
                  import traceback
                  respond(event, context, 'FAILED', reason=traceback.format_exc())

  RSAKeyPair:
    Type: AWS::CloudFormation::CustomResource
    Properties:
      ServiceToken: !GetAtt RSAKeyGenFunction.Arn

  # ── S3 ──────────────────────────────────────────────────────────────────

  LFSBucket:
    Type: AWS::S3::Bucket
    Properties:
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  # ── IAM ─────────────────────────────────────────────────────────────────

  MainLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${AWS::StackName}-main-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal: { Service: lambda.amazonaws.com }
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: S3LFSAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: [s3:GetObject, s3:PutObject]
                Resource: !Sub "${LFSBucket.Arn}/objects/*"

  AuthorizerLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${AWS::StackName}-authorizer-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal: { Service: lambda.amazonaws.com }
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole

  # ── Lambda ──────────────────────────────────────────────────────────────

  AuthorizerFunction:
    Type: AWS::Lambda::Function
    DependsOn: AuthorizerFunctionLogGroup
    Properties:
      FunctionName: !Sub "${AWS::StackName}-authorizer"
      Runtime: provided.al2023
      Handler: bootstrap
      Role: !GetAtt AuthorizerLambdaRole.Arn
      Timeout: 10
      MemorySize: 128
      ReservedConcurrentExecutions: !If [HasLambdaConcurrencyLimit, !Ref LambdaMaxConcurrency, !Ref AWS::NoValue]
      Code:
        S3Bucket: !Ref ArtifactsBucketName
        S3Key: !Ref AuthorizerFunctionS3Key

  HttpApi:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: !Ref AWS::StackName
      ProtocolType: HTTP

  HttpApiStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref HttpApi
      StageName: "$default"
      AutoDeploy: true
      DefaultRouteSettings:
        ThrottlingRateLimit: !Ref ApiThrottlingRateLimit
        ThrottlingBurstLimit: !Ref ApiThrottlingBurstLimit

  CloudFrontOAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub "${AWS::StackName}-oac"
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  CloudFrontPublicKey:
    Type: AWS::CloudFront::PublicKey
    Properties:
      PublicKeyConfig:
        CallerReference: !Sub "${AWS::StackName}-pubkey-v1"
        Name: !Sub "${AWS::StackName}-cf-pubkey"
        EncodedKey: !GetAtt RSAKeyPair.PublicKeyPem

  CloudFrontKeyGroup:
    Type: AWS::CloudFront::KeyGroup
    Properties:
      KeyGroupConfig:
        Name: !Sub "${AWS::StackName}-key-group"
        Items:
          - !Ref CloudFrontPublicKey

  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        IPV6Enabled: true
        Comment: !Sub "${AWS::StackName} Git LFS object cache"
        Origins:
          - DomainName: !GetAtt LFSBucket.RegionalDomainName
            Id: s3-lfs-origin
            OriginAccessControlId: !GetAtt CloudFrontOAC.Id
            S3OriginConfig:
              OriginAccessIdentity: ""
        DefaultCacheBehavior:
          AllowedMethods: [GET, HEAD]
          CachedMethods: [GET, HEAD]
          TargetOriginId: s3-lfs-origin
          ViewerProtocolPolicy: https-only
          TrustedKeyGroups:
            - !Ref CloudFrontKeyGroup
          ForwardedValues:
            QueryString: false
            Cookies: { Forward: none }
          MinTTL: 0
          DefaultTTL: !Ref CloudFrontSignedUrlTTL
          MaxTTL: 86400
        Restrictions:
          GeoRestriction:
            RestrictionType: !If [HasGeoRestriction, "whitelist", "none"]
            Locations: !If [HasGeoRestriction, !Split [",", !Ref CloudFrontGeoRestrictionLocations], !Ref AWS::NoValue]
        ViewerCertificate:
          CloudFrontDefaultCertificate: true

  # Main Lambda is created after CloudFront info is finalized
  MainFunction:
    Type: AWS::Lambda::Function
    DependsOn:
      - HttpApiStage
      - MainFunctionLogGroup
    Properties:
      FunctionName: !Sub "${AWS::StackName}-main"
      Runtime: provided.al2023
      Handler: bootstrap
      Role: !GetAtt MainLambdaRole.Arn
      Timeout: 30
      MemorySize: 128
      ReservedConcurrentExecutions: !If [HasLambdaConcurrencyLimit, !Ref LambdaMaxConcurrency, !Ref AWS::NoValue]
      Code:
        S3Bucket: !Ref ArtifactsBucketName
        S3Key: !Ref MainFunctionS3Key
      Environment:
        Variables:
          S3_BUCKET: !Ref LFSBucket
          CLOUDFRONT_DOMAIN: !GetAtt CloudFrontDistribution.DomainName
          CLOUDFRONT_KEY_PAIR_ID: !Ref CloudFrontPublicKey
          CLOUDFRONT_PRIVATE_KEY: !GetAtt RSAKeyPair.PrivateKeyPem
          CLOUDFRONT_URL_TTL_SECS: !Sub "${CloudFrontSignedUrlTTL}"

  # ── API Gateway ─────────────────────────────────────────────────────────

  LambdaIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref HttpApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub
        - "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${FnArn}/invocations"
        - FnArn: !GetAtt MainFunction.Arn
      PayloadFormatVersion: "2.0"

  LambdaAuthorizer:
    Type: AWS::ApiGatewayV2::Authorizer
    Properties:
      ApiId: !Ref HttpApi
      AuthorizerType: REQUEST
      IdentitySource:
        - "$request.header.authorization"
      Name: github-auth
      AuthorizerUri: !Sub
        - "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${FnArn}/invocations"
        - FnArn: !GetAtt AuthorizerFunction.Arn
      AuthorizerPayloadFormatVersion: "2.0"
      EnableSimpleResponses: true
      AuthorizerResultTtlInSeconds: 300

  ApiRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: "ANY /{proxy+}"
      Target: !Sub "integrations/${LambdaIntegration}"
      AuthorizationType: CUSTOM
      AuthorizerId: !Ref LambdaAuthorizer

  MainLambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !GetAtt MainFunction.Arn
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${HttpApi}/*/*/{proxy+}"

  AuthorizerLambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !GetAtt AuthorizerFunction.Arn
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${HttpApi}/authorizers/*"

  # ── CloudWatch Logs ─────────────────────────────────────────────────────

  RSAKeyGenFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      LogGroupName: !Sub "/aws/lambda/${AWS::StackName}-rsa-key-gen"
      RetentionInDays: !Ref LogRetentionDays

  AuthorizerFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      LogGroupName: !Sub "/aws/lambda/${AWS::StackName}-authorizer"
      RetentionInDays: !Ref LogRetentionDays

  MainFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      LogGroupName: !Sub "/aws/lambda/${AWS::StackName}-main"
      RetentionInDays: !Ref LogRetentionDays

  # ── S3 bucket policy (applied after CloudFront is created) ───────────────

  LFSBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref LFSBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: AllowCloudFrontOAC
            Effect: Allow
            Principal: { Service: cloudfront.amazonaws.com }
            Action: s3:GetObject
            Resource: !Sub "${LFSBucket.Arn}/*"
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub "arn:aws:cloudfront::${AWS::AccountId}:distribution/${CloudFrontDistribution}"

# ────────────────────────────────────────────────────────────────────────────
# Outputs (values shown after the stack is created successfully)
# ────────────────────────────────────────────────────────────────────────────
Outputs:

  LFSBucketName:
    Description: Auto-generated S3 bucket name for LFS objects
    Value: !Ref LFSBucket

  LFSBaseUrl:
    Description: API Gateway endpoint URL
    Value: !Sub "https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com"

  CloudFrontDomain:
    Description: CloudFront domain name
    Value: !GetAtt CloudFrontDistribution.DomainName

  LFSUrlExample:
    Description: "Example git lfs URL (replace <owner>/<repo> with your values)"
    Value: !Sub "https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com/<owner>/<repo>/info/lfs"
